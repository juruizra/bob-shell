# ============================================================================
# GitHub Workflow: Deep Branch Review
# ============================================================================
#
# PURPOSE:
# Performs a comprehensive code review of an entire branch using Bob Shell
# with all custom skills. Analyzes all source files for quality, security,
# architecture, and best practices.
#
# WORKFLOW STEPS:
# 1. Trigger: Manual workflow dispatch with branch selection
# 2. Checkout entire branch
# 3. Load all custom skills
# 4. Analyze all source files
# 5. Generate comprehensive report
# 6. Upload report as artifact + write to Step Summary
# 7. Create issue with findings
#
# REQUIREMENTS:
# - GitHub Secrets: BOBSHELL_API_KEY
# - Skills: .bob/skills/*/SKILL.md files
#
# USAGE:
# Go to Actions > Deep Branch Review > Run workflow
# Select branch to review
#
# ============================================================================

name: Deep Branch Review

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to review'
        required: true
        default: 'main'
      file_pattern:
        description: 'File pattern to review (e.g., "*.py" or "src/**/*.js")'
        required: false
        default: '**/*.py,**/*.js,**/*.ts,**/*.java,**/*.go'

jobs:
  deep-review:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Bob Shell
        run: |
          curl -fsSL https://bob.ibm.com/download/bobshell.sh | bash -s -- --package-manager npm
          if command -v bob &> /dev/null; then
            echo "Bob Shell installed"
            bob --version
          else
            echo "Bob Shell installation failed"
            exit 1
          fi

      - name: Authenticate Bob Shell
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
        run: |
          echo "Configuring Bob Shell authentication..."
          if [ -z "$BOBSHELL_API_KEY" ]; then
            echo "Error: BOBSHELL_API_KEY secret is not set"
            exit 1
          fi
          echo "Bob Shell authentication configured successfully"

      - name: Load Custom Skills
        id: load_skills
        run: |
          echo "Loading all custom skills..."
          SKILLS_CONTENT=""
          SKILL_COUNT=0

          for skill_dir in .bob/skills/*/; do
            if [ -d "$skill_dir" ]; then
              skill_file="${skill_dir}SKILL.md"
              if [ -f "$skill_file" ]; then
                skill_name=$(basename "$skill_dir")
                echo "Loading: $skill_name"
                SKILLS_CONTENT="${SKILLS_CONTENT}\n\n# $skill_name\n\n"
                SKILLS_CONTENT="${SKILLS_CONTENT}$(cat $skill_file)"
                SKILL_COUNT=$((SKILL_COUNT + 1))
              fi
            fi
          done

          echo "Loaded ${SKILL_COUNT} skills"
          printf '%b' "${SKILLS_CONTENT}" > /tmp/skills_context.md
          echo "skill_count=${SKILL_COUNT}" >> $GITHUB_OUTPUT

      - name: Collect Source Files
        id: collect_files
        run: |
          echo "Collecting source files..."

          IFS=',' read -ra PATTERNS <<< "${{ github.event.inputs.file_pattern }}"

          FILES=""
          FILE_COUNT=0
          for pattern in "${PATTERNS[@]}"; do
            while IFS= read -r file; do
              if [ -f "$file" ]; then
                FILES="${FILES}${file}\n"
                FILE_COUNT=$((FILE_COUNT + 1))
              fi
            done < <(find . -path "./.git" -prune -o -type f -name "${pattern}" -print)
          done

          echo "Found ${FILE_COUNT} files to review"
          printf '%b' "${FILES}" > /tmp/files_to_review.txt
          echo "file_count=${FILE_COUNT}" >> $GITHUB_OUTPUT

      - name: Analyze Files in Batches
        id: analyze
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
        run: |
          echo "Analyzing files in batches..."

          BATCH_NUM=0
          mkdir -p /tmp/reviews

          while IFS= read -r file; do
            if [ -z "$file" ]; then
              continue
            fi

            BATCH_NUM=$((BATCH_NUM + 1))
            echo "Analyzing batch ${BATCH_NUM}: ${file}"

            PROMPT_FILE="/tmp/review_prompt_${BATCH_NUM}.md"

            {
              echo "Deep Code Review"
              echo ""
              echo "File: ${file}"
              echo ""
              echo "Review Rules:"
              echo ""
              cat /tmp/skills_context.md
              echo ""
              echo "Code to Review:"
              echo ""
              echo '```'
              cat "${file}"
              echo '```'
              echo ""
              echo "Instructions:"
              echo "Perform a comprehensive review applying ALL custom rules."
              echo "Focus on: Security vulnerabilities, Architecture issues, Code Quality, Best Practices."
              echo "For each issue found, specify: severity (CRITICAL/HIGH/MEDIUM/LOW), location (line number if possible), and recommended fix."
            } > "${PROMPT_FILE}"

            bob --accept-license "$(cat ${PROMPT_FILE})" > /tmp/reviews/review_${BATCH_NUM}.md 2>&1 || {
              echo "Warning: Bob analysis for ${file} failed or timed out" > /tmp/reviews/review_${BATCH_NUM}.md
            }

            if [ $BATCH_NUM -ge 20 ]; then
              echo "Reached batch limit (20 files)"
              break
            fi
          done < /tmp/files_to_review.txt

          echo "Analyzed ${BATCH_NUM} files"
          echo "batch_count=${BATCH_NUM}" >> $GITHUB_OUTPUT

      - name: Generate Comprehensive Report
        id: generate_report
        run: |
          echo "Generating comprehensive report..."

          REPORT_FILE="/tmp/final_report.md"

          {
            echo "# Deep Branch Review Report"
            echo ""
            echo "**Branch:** ${{ github.event.inputs.branch }}"
            echo "**Repository:** ${{ github.repository }}"
            echo "**Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
            echo "**Files Analyzed:** ${{ steps.analyze.outputs.batch_count }}"
            echo "**Skills Applied:** ${{ steps.load_skills.outputs.skill_count }}"
            echo "**Triggered by:** ${{ github.actor }}"
            echo ""
            echo "---"
            echo ""
          } > "${REPORT_FILE}"

          for review_file in /tmp/reviews/*.md; do
            if [ -f "$review_file" ]; then
              cat "$review_file" >> "${REPORT_FILE}"
              echo "" >> "${REPORT_FILE}"
              echo "---" >> "${REPORT_FILE}"
              echo "" >> "${REPORT_FILE}"
            fi
          done

          echo "Report generated ($(wc -c < ${REPORT_FILE}) bytes)"

      - name: Upload Report as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deep-branch-review-${{ github.event.inputs.branch }}-${{ github.run_id }}
          path: /tmp/final_report.md
          retention-days: 30

      - name: Write Report to Step Summary
        run: |
          echo "## Deep Branch Review - Branch: ${{ github.event.inputs.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          head -c 900000 /tmp/final_report.md >> $GITHUB_STEP_SUMMARY

      - name: Create Issue with Report
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let report = fs.readFileSync('/tmp/final_report.md', 'utf8');

            const MAX_LENGTH = 65000;
            if (report.length > MAX_LENGTH) {
              report = report.substring(0, MAX_LENGTH) + '\n\n---\n> Report truncated. Download the full report from the workflow artifact.';
            }

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deep Code Review: ${context.payload.inputs.branch} branch - ${new Date().toISOString().split('T')[0]}`,
              body: report,
              labels: ['code-review', 'bob-shell', 'deep-review']
            });

            console.log(`Created issue #${issue.data.number}: ${issue.data.html_url}`);

# Made with Bob
